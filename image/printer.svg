<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Printer Illustration</title>
  <desc id="desc">Colorful and black white printing illustration for Siddhi Vinayak Mart blog</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff2f2"/>
      <stop offset="1" stop-color="#fff9e8"/>
    </linearGradient>
    <linearGradient id="body" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#d32f2f"/>
      <stop offset="1" stop-color="#ef5350"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6f6f6"/>
    </linearGradient>
  </defs>
  <rect width="640" height="420" fill="url(#bg)"/>
  <g transform="translate(120 58)">
    <rect x="60" y="10" rx="18" ry="18" width="280" height="84" fill="#ffffff" stroke="#e8d9cf" stroke-width="3"/>
    <rect x="82" y="26" rx="8" ry="8" width="236" height="50" fill="url(#paper)"/>
    <rect x="0" y="84" rx="26" ry="26" width="400" height="180" fill="url(#body)"/>
    <rect x="34" y="118" rx="12" ry="12" width="332" height="96" fill="#212121" opacity="0.9"/>
    <circle cx="332" cy="126" r="8" fill="#7ef29a"/>
    <circle cx="306" cy="126" r="8" fill="#fdd835"/>
    <rect x="98" y="166" rx="6" ry="6" width="208" height="10" fill="#ffffff" opacity="0.55"/>
    <rect x="98" y="186" rx="6" ry="6" width="168" height="10" fill="#ffffff" opacity="0.35"/>
    <rect x="80" y="226" rx="8" ry="8" width="240" height="130" fill="#ffffff" stroke="#dedede" stroke-width="3"/>
    <rect x="96" y="244" width="208" height="18" rx="4" fill="#d32f2f"/>
    <rect x="96" y="270" width="150" height="12" rx="4" fill="#2f2f2f"/>
    <rect x="96" y="290" width="190" height="12" rx="4" fill="#555"/>
    <rect x="96" y="310" width="170" height="12" rx="4" fill="#777"/>
  </g>
</svg>
